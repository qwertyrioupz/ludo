# =========================
# Global resolver
# =========================
resolver 127.0.0.11 valid=30s ipv6=off;

# =========================
# Cloudflare real IP passthrough
# =========================
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

# =========================
# Block known malicious tools by user agent
# These are security scanners, attack tools, and aggressive scrapers.
# Search engines and legitimate crawlers are NOT listed here.
# =========================
map $http_user_agent $is_malicious {
    default             0;
    ~*scrapy            1;
    ~*python-requests   1;
    ~*python-urllib     1;
    ~*masscan           1;
    ~*nmap              1;
    ~*zgrab             1;
    ~*nikto             1;
    ~*sqlmap            1;
    ~*dirbuster         1;
    ~*gobuster          1;
    ~*nuclei            1;
    ~*SemrushBot        1;
    ~*AhrefsBot         1;
    ~*DotBot            1;
    ~*MJ12bot           1;
    ~*BLEXBot           1;
    ~*DataForSeoBot     1;
    ~*MegaIndex         1;
    ~*Zoominfobot       1;
    ~*webmeup-crawler   1;
    ~*Bytespider        1;
    ~*PetalBot          1;
}

# =========================
# Rate limiting
# One simple zone: 60 requests/second per IP.
# This is high enough that no real user, browser, or search engine
# will ever hit it under normal use. Only true spam/flood traffic
# will trigger it.
# =========================
limit_req_zone $binary_remote_addr zone=general:20m rate=60r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# =========================
# Known bad IPs (add as you find them)
# =========================
geo $blocked_ip {
    default 0;
    # Example: 43.163.0.0/16 1;
}

# =========================
# Upstream
# =========================
upstream affigen_app {
    server app:3000;
    keepalive 32;
}

# =========================
# Logging
# =========================
log_format detailed
    'ip=$remote_addr time="$time_local" '
    'method=$request_method url="$request_uri" '
    'status=$status ua="$http_user_agent" '
    'rt=$request_time';

server {
    listen 80;
    listen 443 ssl;

    server_name affitechbio.com www.affitechbio.com;

    ssl_certificate     /etc/ssl/certs/selfsigned-server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;

    access_log /var/log/nginx/access.log detailed;
    error_log  /var/log/nginx/error.log warn;

    # Max 100 simultaneous connections per IP
    limit_conn conn_limit 100;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    proxy_connect_timeout 120s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    proxy_buffering       off;
    proxy_request_buffering off;

    # Block malicious tools
    if ($is_malicious) { return 444; }

    # Block known bad IPs
    if ($blocked_ip)   { return 444; }

    # Block attack-pattern query strings (over 2000 chars)
    if ($query_string ~* "^.{2000,}$") { return 444; }

    # www → non-www
    if ($http_host = "www.affitechbio.com") {
        rewrite ^ https://affitechbio.com$request_uri permanent;
    }

    # ======================================
    # SEO-CRITICAL: sitemaps and robots.txt
    # No rate limiting. No caching headers that could confuse crawlers.
    # ======================================
    location = /robots.txt  { proxy_pass http://affigen_app; proxy_http_version 1.1; proxy_set_header Connection ""; add_header Cache-Control "public, max-age=86400"; }
    location = /sitemap.xml { proxy_pass http://affigen_app; proxy_http_version 1.1; proxy_set_header Connection ""; add_header Cache-Control "public, max-age=3600"; }
    location /sitemap/      { proxy_pass http://affigen_app; proxy_http_version 1.1; proxy_set_header Connection ""; add_header Cache-Control "public, max-age=3600"; }
    location /api/sitemap/  { proxy_pass http://affigen_app; proxy_http_version 1.1; proxy_set_header Connection ""; add_header Cache-Control "public, max-age=3600"; }

    # Taxonomy sitemaps — no rate limiting, cached for 1 hour
    location = /species/sitemap.xml         { proxy_pass http://affigen_app; proxy_http_version 1.1; proxy_set_header Connection ""; add_header Cache-Control "public, max-age=3600"; }
    location = /genes/sitemap.xml           { proxy_pass http://affigen_app; proxy_http_version 1.1; proxy_set_header Connection ""; add_header Cache-Control "public, max-age=3600"; }
    location = /research-fields/sitemap.xml { proxy_pass http://affigen_app; proxy_http_version 1.1; proxy_set_header Connection ""; add_header Cache-Control "public, max-age=3600"; }

    # ======================================
    # Static assets — no rate limiting, long cache
    # ======================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://affigen_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ======================================
    # Everything else — one simple rate limit
    # 60 r/s with a burst of 200 means a real user or Googlebot
    # crawling fast will never be blocked. Only a genuine flood hits this.
    # ======================================
    location / {
        limit_req zone=general burst=200 nodelay;
        limit_req_status 429;

        proxy_pass http://affigen_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Longer timeout for API/form submissions
        proxy_read_timeout 180s;
    }

    # Internal health check
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
}